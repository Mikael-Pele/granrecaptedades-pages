<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: black;
        font-family: 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    h2 { margin-bottom: 20px; z-index: 20; color: white; }

    /* The main board container */
    .dartboard {
        position: relative;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        overflow: visible;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Central Bullseye (Logo) */
    .bullseye-logo {
        position: absolute;
        width: 160px;
        height: 160px;
        background-color: black;
        border-radius: 50%;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .bullseye-logo img {
        width: 80%;
        height: auto;
    }

    /* Common Button/Segment Style */
    .segment {
        position: absolute;
        width: 100%;
        height: 100%;
        border: none;
        cursor: pointer;
        color: white;
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s ease;
        /* Clip-path creates the "wedge" shape */
        clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 40%);
    }

    /* Position each segment around the center */
    /* We rotate the segment's position, but NOT its internal content */
    .seg-1 { background-color: #4169e1; transform: rotate(0deg); }
    .seg-2 { background-color: #136207; transform: rotate(72deg); }
    .seg-3 { background-color: #D67732; transform: rotate(144deg); }
    .seg-4 { background-color: #7851A9; transform: rotate(216deg); }
    .seg-5 { background-color: #C71585; transform: rotate(288deg); }

    /* Fix text alignment so it isn't rotated or upside down */
    .btn-text {
        position: absolute;
        width: 120px;
        top: 15%;
        left: 60%;
        transform-origin: center;
    }

    /* Undo the rotation of the parent segment so text stays level */
    .seg-1 .btn-text { transform: rotate(0deg); }
    .seg-2 .btn-text { transform: rotate(-72deg); }
    .seg-3 .btn-text { transform: rotate(-144deg); }
    .seg-4 .btn-text { transform: rotate(-216deg); }
    .seg-5 .btn-text { transform: rotate(-288deg); }

    .segment:hover {
        filter: brightness(1.3);
        z-index: 11;
        scale: 1.05;
    }

    /* Mobile Fallback */
    @media (max-width: 550px) {
        .dartboard { width: 300px; height: 300px; }
        .bullseye-logo { width: 100px; height: 100px; }
        .btn-text { font-size: 12px; width: 80px; }
    }
</style>
</head>
<body>

    <h2>Quadres de Comandament</h2>

    <div class="dartboard">
        <div class="bullseye-logo">
            <img src="BdA_Logo RGB_pos.png" alt="Logo">
        </div>

        <button class="segment seg-1" onclick="openDash('...')"><span class="btn-text">Foodback</span></button>
        <button class="segment seg-2" onclick="openDash('...')"><span class="btn-text">Tribal</span></button>
        <button class="segment seg-3" onclick="openDash('...')"><span class="btn-text">SinergiaCRM</span></button>
        <button class="segment seg-4" onclick="openDash('...')"><span class="btn-text">Gran Recapte</span></button>
        <button class="segment seg-5" onclick="openDash('...')"><span class="btn-text">Marketing</span></button>
    </div>

    <script>
        function openDash(dash) {
            window.open(atob(dash), "_blank");
        }
    </script>

</body>
</html>
