<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: black;
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    h2 { color: white; margin-bottom: 30px; letter-spacing: 2px; }

    /* The main circular container */
    .emblem-container {
        position: relative;
        width: 550px;
        height: 550px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Central Logo (The inner bull) */
    .center-logo-container {
        position: absolute;
        width: 320px;
        height: 320px;
        background-color: #111; /* Dark core for the logo */
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 0 15px rgba(0,0,0,0.5);
    }

    .center-logo-container img {
        width: 75%;
        height: auto;
    }

    /* The SVG Ring Styling */
    svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg); /* Start the circle from the top */
    }

    .outer-ring {
        fill: white;
        stroke: #4169e1; /* Royal Blue border line */
        stroke-width: 4;
    }

    /* Clickable Text Segments */
    text {
        font-weight: 900;
        font-size: 24px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
    }

    text:hover {
        font-size: 28px;
        filter: brightness(1.5);
    }

    /* Button specific colors */
    .btn-blue    { fill: #4169e1; }
    .btn-green   { fill: #136207; }
    .btn-orange  { fill: #D67732; }
    .btn-purple  { fill: #7851A9; }
    .btn-crimson { fill: #C71585; }

</style>
</head>
<body>

    <h2>Quadres de Comandament</h2>

    <div class="emblem-container">
        <!-- Inner Bullseye -->
        <div class="center-logo-container">
            <img src="BdA_Logo RGB_pos.png" alt="BdA Logo">
        </div>

        <!-- Outer Ring with Curved Text Buttons -->
        <svg viewBox="0 0 500 500">
            <!-- The White Ring Path -->
            <path id="circlePath" d="M 250, 250 m -210, 0 a 210,210 0 1,1 420,0 a 210,210 0 1,1 -420,0" fill="none" />
            <circle cx="250" cy="250" r="235" class="outer-ring" />

            <!-- Labels spaced evenly (20% intervals) -->
            <text class="btn-blue" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM3Lz9zdGFuZGFsb25lPTI=')">
                <textPath xlink:href="#circlePath" startOffset="0%">• Foodback</textPath>
            </text>

            <text class="btn-green" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQwLz9zdGFuZGFsb25lPTI=')">
                <textPath xlink:href="#circlePath" startOffset="20%">• Tribal</textPath>
            </text>

            <text class="btn-orange" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM1Lz9zdGFuZGFsb25lPTI=')">
                <textPath xlink:href="#circlePath" startOffset="40%">• SinergiaCRM</textPath>
            </text>

            <text class="btn-purple" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzMwLz9zdGFuZGFsb25lPTI=')">
                <textPath xlink:href="#circlePath" startOffset="60%">• Gran Recapte</textPath>
            </text>

            <text class="btn-crimson" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQyLz9zdGFuZGFsb25lPTI=')">
                <textPath xlink:href="#circlePath" startOffset="80%">• Marketing</textPath>
            </text>
        </svg>
    </div>

    <script>
        function openDash(dash) {
            window.open(atob(dash), "_blank");
        }
    </script>

</body>
</html>
