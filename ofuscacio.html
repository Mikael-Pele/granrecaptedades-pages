<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: black; 
        font-family: 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    h2 {
        margin-bottom: 20px;
        z-index: 10;
    }

    .circle-container {
        position: relative;
        width: 600px;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .center-logo {
        width: 220px;
        height: auto;
        z-index: 5;
        position: absolute;
    }

    /* Round Button Styling */
    .btn {
        position: absolute;
        border: none;
        width: 120px;       /* Fixed width */
        height: 120px;      /* Fixed height makes it a circle */
        border-radius: 50%; /* Perfect circle */
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        color: white;
        z-index: 6;
        padding: 10px;      /* Prevents text touching edges */
        line-height: 1.2;
    }

    /* Positioning (X, Y) - Keeps buttons level */
    /* Adjust translate values to move buttons closer/further */
    .btn:nth-child(2) { transform: translate(0, -220px); }    /* Top */
    .btn:nth-child(3) { transform: translate(210px, -70px); }  /* Top Right */
    .btn:nth-child(4) { transform: translate(130px, 180px); }  /* Bottom Right */
    .btn:nth-child(5) { transform: translate(-130px, 180px); } /* Bottom Left */
    .btn:nth-child(6) { transform: translate(-210px, -70px); } /* Top Left */

    /* Button Colors */
    .blue-btn    { background-color: #4169e1; }
    .green-btn   { background-color: #136207; }
    .orange-btn  { background-color: #D67732; }
    .purple-btn  { background-color: #7851A9; }
    .crimson-btn { background-color: #C71585; }

    .btn:hover {
        filter: brightness(1.2);
        transform: scale(1.1) !important; /* Scale up slightly on hover */
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    /* Mobile: Stack them */
    @media (max-width: 650px) {
        .circle-container {
            height: auto;
            flex-direction: column;
            gap: 15px;
        }
        .center-logo, .btn {
            position: static;
            transform: none !important;
            width: 200px;
            height: auto;
            border-radius: 8px;
        }
    }
</style>
</head>
<body>

    <h2>Quadres de Comandament</h2>
