<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BdA Dashboard</title>
    <style>
    body {
        background-color: white; 
        font-family: 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh; 
        overflow-y: auto; 
        padding: 20px 0;
    }

    .circle-container {
        position: relative;
        width: 600px;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .center-logo {
        width: 200px;
        height: auto;
        z-index: 5;
        position: absolute;
    }

    /* DESKTOP: Round Circles */
    .btn {
        position: absolute;
        border: none;
        width: 140px; 
        height: 140px;
        border-radius: 50%; /* Circle */
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        color: white;
        z-index: 6;
        padding: 10px;
        box-sizing: border-box;
    }

    /* Positions for Circular Layout */
    .btn:nth-child(2) { transform: translate(0, -220px); }    
    .btn:nth-child(3) { transform: translate(240px, -70px); }  
    .btn:nth-child(4) { transform: translate(150px, 180px); }  
    .btn:nth-child(5) { transform: translate(-150px, 180px); } 
    .btn:nth-child(6) { transform: translate(-240px, -70px); } 

    .blue-btn    { background-color: #4169e1; }
    .green-btn   { background-color: #136207; }
    .orange-btn  { background-color: #D67732; }
    .purple-btn  { background-color: #7851A9; }
    .crimson-btn { background-color: #C71585; }

    .btn:hover {
        filter: brightness(1.1);
        scale: 1.05;
    }

    /* MOBILE: Rectangular Boxes */
    @media (max-width: 650px) {
        body {
            justify-content: flex-start;
            padding-top: 40px;
        }

        .circle-container {
            width: 90%;
            height: auto;
            flex-direction: column;
            gap: 15px;
        }

        .center-logo {
            position: static;
            margin-bottom: 30px;
            width: 180px;
        }

        .btn {
            position: static;
            transform: none !important;
            /* Resetting to Rectangle */
            width: 100%;
            max-width: 300px;
            height: auto;
            min-height: 50px;
            border-radius: 8px; /* Original boxy look */
            padding: 15px 20px;
        }
    }
</style>
</head>
<body>

    <div class="circle-container">
        <img src="BdA_Logo RGB_pos.png" alt="BdA Logo" class="center-logo">

        <button class="btn blue-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM3Lz9zdGFuZGFsb25lPTI=')">
            Foodback
        </button>

        <button class="btn green-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQwLz9zdGFuZGFsb25lPTI=')">
            Tribal
        </button>

        <button class="btn orange-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM1Lz9zdGFuZGFsb25lPTI=')">
            SinergiaCRM
        </button>

        <button class="btn purple-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzMwLz9zdGFuZGFsb25lPTI=')">
            Gran Recapte
        </button>

        <button class="btn crimson-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQyLz9zdGFuZGFsb25lPTI=')">
            Marketing
        </button>
        <button class="btn crimson-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQyLz9zdGFuZGFsb25lPTI=')">
            Marketing
        </button>
    </div>

    <script>
        // Prevent scroll memory on refresh
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        function openDash(dash) {
            window.open(atob(dash), "_blank");
        }
    </script>
</body>
</html>
