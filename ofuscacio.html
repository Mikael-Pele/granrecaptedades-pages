<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 40px 0;
        }

        .circle-container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-logo {
            width: 200px;
            height: auto;
            z-index: 5;
            position: absolute;
        }

        .btn {
            position: absolute;
            border: none;
            /* Circle on Desktop */
            width: 140px; 
            height: 140px;
            border-radius: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease, transform 0.5s ease; /* Smooth move when adding buttons */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: white;
            z-index: 6;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Button Colors */
        .blue-btn    { background-color: #4169e1; }
        .green-btn   { background-color: #136207; }
        .orange-btn  { background-color: #D67732; }
        .purple-btn  { background-color: #7851A9; }
        .crimson-btn { background-color: #C71585; }

        .btn:hover {
            filter: brightness(1.2);
            scale: 1.1;
        }

        @media (max-width: 650px) {
            .circle-container {
                width: 100%;
                height: auto;
                flex-direction: column;
                gap: 15px;
            }
            .center-logo {
                position: static;
                margin-bottom: 20px;
            }
            .btn {
                position: static;
                transform: none !important;
                /* Box on Mobile */
                width: 100%;
                max-width: 300px;
                height: auto;
                min-height: 50px;
                border-radius: 8px;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="circle-container" id="menuContainer">
        <img src="BdA_Logo RGB_pos.png" alt="BdA Logo" class="center-logo">

        <button class="btn blue-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM3Lz9zdGFuZGFsb25lPTI=')">Foodback</button>
        <button class="btn green-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQwLz9zdGFuZGFsb25lPTI=')">Tribal</button>
        <button class="btn orange-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM1Lz9zdGFuZGFsb25lPTI=')">SinergiaCRM</button>
        <button class="btn purple-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzMwLz9zdGFuZGFsb25lPTI=')">Gran Recapte</button>
        <button class="btn crimson-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzQyLz9zdGFuZGFsb25lPTI=')">Marketing</button>
        <!-- Add your 6th, 7th, or 8th buttons here! -->
    </div>

    <script>
        function arrangeButtons() {
            const buttons = document.querySelectorAll('.btn');
            const total = buttons.length;
            const radius = 230; // Radius of the circle

            buttons.forEach((btn, i) => {
                if (window.innerWidth > 650) {
                    // Divide 360 degrees by total buttons
                    const angle = (i * (360 / total)) - 90; 
                    const radian = angle * (Math.PI / 180);
                    
                    const x = Math.round(radius * Math.cos(radian));
                    const y = Math.round(radius * Math.sin(radian));

                    btn.style.transform = `translate(${x}px, ${y}px)`;
                } else {
                    btn.style.transform = 'none';
                }
            });
        }

        // Logic to prevent scroll memory
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        function openDash(dash) {
            window.open(atob(dash), "_blank");
        }

        // Run positioning on load and window resize
        window.addEventListener('load', arrangeButtons);
        window.addEventListener('resize', arrangeButtons);
    </script>
</body>
</html>
