<!DOCTYPE html>
<html>
<head>
<style>
    /* Black Background */
    body {
        background-color: black; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: white;
    }
	

    /* Logo Styling */
    .logo {
        max-width: 250px; /* Adjust size as needed */
        height: auto;
        margin-bottom: 20px;
    }

    h2 {
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* Container to keep buttons side-by-side */
    .button-group {
        display: flex;
        gap: 20px; /* Space between buttons */
        justify-content: center;
    }

    .btn {
        border: none;
        padding: 15px 30px;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        min-width: 200px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    /* Royal Blue Button */
    .blue-btn {
        background-color: #4169e1;
        color: white;
    }

    /* Royal Green Button */
    .lime-btn {
        background-color: #136207;
        color: white;
    }

    /* Hover effects */
    .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }

    .btn:active {
        transform: translateY(0);
    }

    /* Stack buttons on small mobile screens */
    @media (max-width: 500px) {
        .button-group {
            flex-direction: column;
        }
    }
</style>
</head>
<body>

</html>
