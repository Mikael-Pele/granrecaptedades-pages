<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: white; 
        font-family: 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    h2 {
        margin-bottom: 20px;
        z-index: 10;
    }

    .circle-container {
        position: relative;
        width: 600px;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .center-logo {
        width: 200px;
        height: auto;
        z-index: 5;
        position: absolute;
    }

    .btn {
        position: absolute;
        border: none;
        padding: 15px 20px;
        text-align: center;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px; /* Changed to match your previous style */
        min-width: 160px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        color: white;
        z-index: 6;
    }

    /* Position buttons around the center without tilting them */
    /* Adjust translate(X, Y) to move them further/closer */
    .btn:nth-child(2) { transform: translate(0, -220px); }    /* Top */
    .btn:nth-child(3) { transform: translate(240px, -70px); }  /* Top Right */
    .btn:nth-child(4) { transform: translate(150px, 180px); }  /* Bottom Right */
    .btn:nth-child(5) { transform: translate(-150px, 180px); } /* Bottom Left */
    .btn:nth-child(6) { transform: translate(-240px, -70px); } /* Top Left */

    /* Button Colors */
    .blue-btn    { background-color: #4169e1; }
    .green-btn   { background-color: #136207; }
    .orange-btn  { background-color: #D67732; }
    .purple-btn  { background-color: #7851A9; }
    .crimson-btn { background-color: #C71585; }

    .btn:hover {
        filter: brightness(1.2);
        scale: 1.1;
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    @media (max-width: 650px) {
        .circle-container {
            width: auto;
            height: auto;
            flex-direction: column;
            gap: 15px;
        }
        .center-logo, .btn {
            position: static;
            transform: none !important;
        }
    }
</style>
</head>
<body>

    <div class="circle-container">
        <!-- Logo must be first so nth-child(2) is the first button -->
        <img src="BdA_Logo RGB_pos.png" alt="BdA Logo" class="center-logo">

        <button class="btn blue-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM3Lz9zdGFuZGFsb25lPTI=')">

        <button class="btn orange-btn" onclick="openDash('aHR0cHM6Ly9ncmFucmVjYXB0ZS5kYXRhbGFiLmNhdC9sb2dpbj91c2VybmFtZT1yZWFkb25seSZyZWRpcmVjdD0vc3VwZXJzZXQvZGFzaGJvYXJkLzM1Lz9zdGFuZGFsb25lPTI=')">
